// ── Calculations ──────────────────────────────────────────────────────────
// All $ = Bigabid expected revenue saved, not gross spend
//
// RT Calibration:
//   Churn prevention: EXPLORATION_DAILY × churnRisk% × CALIB_RATIO × margin% × 30d
//   Budget expansion: top N exploration accounts × expansionGrowth% × margin% × 30d
//
// PWB (per exchange — same logic as RT):
//   Revenue protected: exchange_spend × pwbChurnRisk% × margin% × 30d
//   Revenue expansion: exchange_spend × pwbExp% × margin% × 30d

function calcRT(params, marginRate) {
  const m = marginRate / 100;
  const atRisk       = EXPLORATION_DAILY * (params.churnRisk / 100);
  const saved        = atRisk * CALIB_RATIO;
  const churnMargin  = saved * m;
  const churnMo      = churnMargin * 30;
  const expandN      = Math.round(NEW_EXPLORATION_ACCOUNTS.length * (params.expansionAccts / 100));
  const expandSpend  = NEW_EXPLORATION_ACCOUNTS.slice(0, expandN).reduce((s, a) => s + a.spend, 0);
  const newSpend     = expandSpend * (params.expansionGrowth / 100);
  const expMargin    = newSpend * m;
  const expMo        = expMargin * 30;
  return {
    atRisk, saved, churnMargin, churnMo,
    expandN, expandSpend, newSpend, expMargin, expMo,
    totalDailyMargin: churnMargin + expMargin,
    totalMo: churnMo + expMo,
  };
}

function calcPWB(params, marginRate) {
  const m  = marginRate / 100;
  const or = params.overbidRate      / 100;
  const rd = params.overbidReduction / 100;
  const exchanges = EXCHANGE_DATA.filter(e => e.pwb).map(ex => {
    const currentOverbid = ex.spend * or;
    const recovered      = currentOverbid * rd;
    const dailyRev       = recovered * m;
    const monthRev       = dailyRev * 30;
    return { ...ex, currentOverbid, recovered, dailyRev, monthRev };
  });
  const totalDaily = exchanges.reduce((s, e) => s + e.dailyRev, 0);
  return { exchanges, totalDaily, totalMo: totalDaily * 30 };
}

// ── Needle Gauge ──────────────────────────────────────────────────────────
function Needle({ value, max, label, sublabel, color }) {
  const clampedPct = Math.min(100, Math.max(0, (value / max) * 100));
  // Needle sweeps from -135° to +135° (270° total arc)
  const angleDeg = -135 + (clampedPct / 100) * 270;
  const angleRad = ((angleDeg - 90) * Math.PI) / 180;
  const cx = 80, cy = 72, r = 58;
  const needleLen = 48;
  const nx = cx + needleLen * Math.cos(angleRad);
  const ny = cy + needleLen * Math.sin(angleRad);

  // Arc path helpers
  const arcX = (deg) => cx + r * Math.cos(((deg - 90) * Math.PI) / 180);
  const arcY = (deg) => cy + r * Math.sin(((deg - 90) * Math.PI) / 180);

  return (
    <div style={{ textAlign: "center", fontFamily: "Poppins,sans-serif" }}>
      <svg width="160" height="100" viewBox="0 0 160 100">
        {/* Track arc */}
        <path
          d={`M ${arcX(-135)} ${arcY(-135)} A ${r} ${r} 0 1 1 ${arcX(135)} ${arcY(135)}`}
          fill="none" stroke={B.silverLining} strokeWidth="7" strokeLinecap="round"
        />
        {/* Value arc */}
        {clampedPct > 0 && (
          <path
            d={`M ${arcX(-135)} ${arcY(-135)} A ${r} ${r} 0 ${clampedPct > 50 ? 1 : 0} 1 ${arcX(-135 + (clampedPct / 100) * 270)} ${arcY(-135 + (clampedPct / 100) * 270)}`}
            fill="none" stroke={color} strokeWidth="7" strokeLinecap="round"
          />
        )}
        {/* Needle */}
        <line x1={cx} y1={cy} x2={nx} y2={ny}
          stroke={B.nightBlue} strokeWidth="2.5" strokeLinecap="round" />
        <circle cx={cx} cy={cy} r="5" fill={B.nightBlue} />
        {/* Zone ticks */}
        {[0, 33, 66, 100].map(p => {
          const deg = -135 + (p / 100) * 270;
          const rad = ((deg - 90) * Math.PI) / 180;
          return (
            <line key={p}
              x1={cx + (r - 8) * Math.cos(rad)} y1={cy + (r - 8) * Math.sin(rad)}
              x2={cx + (r + 2) * Math.cos(rad)} y2={cy + (r + 2) * Math.sin(rad)}
              stroke={B.silverLining} strokeWidth="1.5" />
          );
        })}
      </svg>
      <div style={{ fontSize: 18, fontWeight: 800, color, marginTop: -10,
        fontFamily: "Poppins,sans-serif" }}>{fmtQ(value)}</div>
      <div style={{ fontSize: 13, fontWeight: 700, color: B.nightBlue,
        fontFamily: "Poppins,sans-serif", marginTop: 2 }}>{label}</div>
      {sublabel && <div style={{ fontSize: 13, color: "#999",
        fontFamily: "Poppins,sans-serif", marginTop: 1 }}>{sublabel}</div>}
    </div>
  );
}

  if (scenario !== prevScenario) {
    setPrevScenario(scenario);
    setOverbidRate(def.overbidRate);
    setOverbidReduction(def.overbidReduction);

      <Card style={{ borderLeft: `4px solid ${B.livingCoral}` }}>
        <SectionTitle icon="⚡" sub="PWB uses ADX+AppLovin averages on Fyber/Unity/Chartboost → overbidding → margin bleed">

        </SectionTitle>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
          <Pill label="of RT spend on proxy-priced exchanges"  value={pct(PWB_DAILY, TOTAL_DAILY)} color={B.livingCoral} />

                  sublabel="rev saved" color={ex.color} />
              ))}
              <Needle value={res.totalMo} max={maxNeedle}
                label="Total proxy exchanges/mo" sublabel="rev saved" color={B.nightBlue} />
            </div>
          </div>
        </div>
      </Card>

      {/* Q2 result */}
      <div style={{ background: B.nightBlue, borderRadius: 14, padding: "18px 20px",
        marginBottom: 14 }}>
        <div style={{ fontSize: 13, color: B.silverLining, fontFamily: "Poppins,sans-serif",
          textTransform: "uppercase", letterSpacing: 2, marginBottom: 4 }}>
          Monthly Expected Revenue Saved — ADX+AppLovin Proxy Exchanges
        </div>
        <div style={{ fontSize: 38, fontWeight: 800, color: B.white,
          fontFamily: "Poppins,sans-serif" }}>{fmtQ(res.totalMo)}</div>
        <div style={{ display: "flex", gap: 10, marginTop: 10, flexWrap: "wrap" }}>
          {res.exchanges.map(ex => (
            <div key={ex.name} style={{ background: "#ffffff12", borderRadius: 10,
              padding: "10px 14px", flex: 1, minWidth: 80 }}>
              <div style={{ fontSize: 15, fontWeight: 800, color: ex.color,
                fontFamily: "Poppins,sans-serif" }}>{fmtQ(ex.monthRev)}</div>
              <div style={{ fontSize: 13, color: B.silverLining,
                fontFamily: "Poppins,sans-serif", marginTop: 2, textTransform: "capitalize" }}>{ex.name}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Per-exchange breakdown bars */}
      <Card>
        <SectionTitle icon="📊">Per-Exchange Detail</SectionTitle>
        {res.exchanges.map(ex => (
          <div key={ex.name} style={{ display: "flex", alignItems: "center", gap: 10,
            padding: "12px 14px", borderRadius: 10, marginBottom: 8,
            background: ex.color + "12", borderLeft: `3px solid ${ex.color}` }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: B.nightBlue,
                fontFamily: "Poppins,sans-serif", textTransform: "capitalize",
                marginBottom: 3 }}>{ex.name}</div>
              <div style={{ fontSize: 13, color: "#777", fontFamily: "Poppins,sans-serif",
                lineHeight: 1.7 }}>
                <div>{fmt(ex.spend)}/day spend on this exchange</div>
                <div>{fmt(ex.spend)}/day spend · Daily overbid waste: {fmt(ex.currentOverbid)} · Recovered: {fmt(ex.recovered)}/day</div>
                <div>Revenue saved/day: <strong>{fmt(ex.dailyRev)}</strong></div>
              </div>
            </div>
            <div style={{ textAlign: "right", flexShrink: 0 }}>
              <div style={{ fontSize: 18, fontWeight: 800, color: ex.color,
                fontFamily: "Poppins,sans-serif" }}>{fmtQ(ex.monthRev)}</div>
              <div style={{ fontSize: 13, color: "#aaa",
                fontFamily: "Poppins,sans-serif" }}>Monthly rev saved</div>
            </div>
          </div>
        ))}

        <div style={{ marginTop: 8 }}>
          <SectionTitle icon="📋">All Scenarios</SectionTitle>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13,
            fontFamily: "Poppins,sans-serif" }}>
            <thead>
              <tr style={{ background: B.nightBlue, color: B.white }}>
                {["Scenario", "Overbid Rate", "Reduction After", "Fyber/mo", "Unity/mo", "Chartboost/mo", "Total/mo"].map((h, i) => (
                  <th key={h} style={{ padding: "7px 8px", textAlign: i === 0 ? "left" : "right",
                    fontSize: 13, fontWeight: 600 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {Object.entries(SCENARIO_DEFAULTS).map(([sc, def], i) => {
                const r = calcPWB(def, marginRate);
                const active = sc === scenario;
                const label = sc === "mostLikely" ? "Most Likely" : sc === "veryGood" ? "Very Good" : "Best Case";
                return (
                  <tr key={sc} style={{
                    background: active ? B.livingCoral + "18" : i % 2 === 0 ? "#f8f8f8" : B.white,
                    fontWeight: active ? 700 : 400 }}>
                    <td style={{ padding: "7px 8px" }}>{label}{active ? " ◄" : ""}</td>
                    <td style={{ padding: "7px 8px", textAlign: "right", color: B.livingCoral }}>{def.overbidRate}%</td>
                    <td style={{ padding: "7px 8px", textAlign: "right", color: B.surfGreen }}>{def.overbidReduction}%</td>
                    {r.exchanges.map(e => (
                      <td key={e.name} style={{ padding: "7px 8px", textAlign: "right" }}>{fmtQ(e.monthRev)}</td>
                    ))}
                    <td style={{ padding: "7px 8px", textAlign: "right", fontWeight: 700 }}>{fmtQ(r.totalMo)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>

      {/* Exchange budget breakdown */}
      <Card>
        <SectionTitle icon="💱">RT Budget by Exchange
          <span style={{ fontSize: 13, fontWeight: 400, color: "#888", marginLeft: 6 }}>
            {fmt(TOTAL_DAILY)}/day total
          </span>
        </SectionTitle>
        {EXCHANGE_DATA.map(ex => (
          <div key={ex.name} style={{ marginBottom: 9 }}>
            <div style={{ display: "flex", justifyContent: "space-between",
              alignItems: "center", marginBottom: 3 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                <div style={{ width: 10, height: 10, borderRadius: 3, background: ex.color }} />
                <span style={{ fontSize: 13, fontWeight: 600, color: B.nightBlue,
                  fontFamily: "Poppins,sans-serif", textTransform: "capitalize" }}>{ex.name}</span>
                {ex.pwb && (
                  <span style={{ fontSize: 13, background: B.livingCoral + "22",
                    color: B.livingCoral, borderRadius: 4, padding: "1px 6px",
                    fontWeight: 700, fontFamily: "Poppins,sans-serif" }}>PWB target</span>
                )}
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <span style={{ fontSize: 13, color: "#bbb" }}>{pct(ex.spend, TOTAL_DAILY)}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: B.nightBlue,
                  fontFamily: "Poppins,sans-serif" }}>{fmt(ex.spend)}</span>
              </div>
            </div>
            <div style={{ height: 7, background: B.silverLining + "55", borderRadius: 5, overflow: "hidden" }}>
              <div style={{ height: "100%", width: pct(ex.spend, TOTAL_DAILY),
                background: ex.color, borderRadius: 5 }} />
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}
